services:
  # ─────────────────────────────────────────────
  # PostgreSQL — primary database for all services
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ai-crm-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ai_crm
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-crm

  # ─────────────────────────────────────────────
  # Qdrant — vector store for RAG knowledge base
  # ─────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.16.3
    container_name: ai-crm-qdrant
    restart: unless-stopped
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "127.0.0.1:6333:6333"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ai-crm

  # ─────────────────────────────────────────────
  # n8n — workflow automation engine
  # ─────────────────────────────────────────────
  n8n:
    image: n8nio/n8n:latest
    container_name: ai-crm-n8n
    restart: unless-stopped
    environment:
      - N8N_HOST=${N8N_DOMAIN:-n8n.ai-ops.jaor13.app}
      - N8N_PORT=5678
      - N8N_PROTOCOL=https
      - N8N_EDITOR_BASE_URL=https://${N8N_DOMAIN:-n8n.ai-ops.jaor13.app}/
      - WEBHOOK_URL=https://${N8N_DOMAIN:-n8n.ai-ops.jaor13.app}/
      - N8N_SECURE_COOKIE=true
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      - N8N_RUNNERS_ENABLED=false
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=${POSTGRES_USER:-postgres}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:?Set N8N_PASSWORD in .env}
      - GENERIC_TIMEZONE=${TIMEZONE:-Asia/Manila}
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-crm

  # ─────────────────────────────────────────────
  # Laravel — dashboard application (PHP + Nginx)
  # ─────────────────────────────────────────────
  laravel:
    build:
      context: ..
      dockerfile: docker/laravel/Dockerfile
    container_name: ai-crm-laravel
    restart: unless-stopped
    environment:
      APP_NAME: "AI Customer Ops"
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://${APP_DOMAIN:-ai-ops.jaor13.app}
      APP_KEY: ${LARAVEL_APP_KEY:?Set LARAVEL_APP_KEY in .env}
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ai_crm
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      CACHE_STORE: file
      SESSION_DRIVER: file
      QUEUE_CONNECTION: database
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      QDRANT_HOST: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-ai_crm_knowledge}
      QDRANT_TIMEOUT: ${QDRANT_TIMEOUT:-15}
      OLLAMA_HOST: ${OLLAMA_HOST:-}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text}
      N8N_WEBHOOK_URL: http://n8n:5678
      # Knowledge base ingestion
      KB_DISK: ${KB_DISK:-local}
      KB_MAX_UPLOAD_KB: ${KB_MAX_UPLOAD_KB:-10240}
      KB_OCR_ENABLED: ${KB_OCR_ENABLED:-true}
      N8N_INGEST_URL: ${N8N_INGEST_URL:-}
      N8N_WEBHOOK_SECRET: ${N8N_WEBHOOK_SECRET:-}
      N8N_TIMEOUT: ${N8N_TIMEOUT:-30}
      # S3 storage (for KB file uploads)
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
      AWS_BUCKET: ${AWS_BUCKET:-}
      AWS_URL: ${AWS_URL:-}
      AWS_ENDPOINT: ${AWS_ENDPOINT:-}
      AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
    volumes:
      - laravel_storage:/var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ai-crm

  # ─────────────────────────────────────────────
  # Nginx — reverse proxy with SSL termination
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: ai-crm-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - laravel
      - n8n
    networks:
      - ai-crm

  # ─────────────────────────────────────────────
  # Certbot — automated SSL certificate renewal
  # ─────────────────────────────────────────────
  certbot:
    image: certbot/certbot:latest
    container_name: ai-crm-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    networks:
      - ai-crm

volumes:
  postgres_data:
  qdrant_data:
  n8n_data:
  laravel_storage:

networks:
  ai-crm:
    driver: bridge
