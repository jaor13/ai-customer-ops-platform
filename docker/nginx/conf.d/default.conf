# ─────────────────────────────────────────────
# HTTP → HTTPS redirect (Laravel dashboard)
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name ai-ops.jaor13.app www.ai-ops.jaor13.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — Laravel dashboard
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name ai-ops.jaor13.app www.ai-ops.jaor13.app;

    ssl_certificate     /etc/letsencrypt/live/ai-ops.jaor13.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ai-ops.jaor13.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    client_max_body_size 25M;

    location / {
        proxy_pass http://laravel:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─────────────────────────────────────────────
# HTTP → HTTPS redirect (n8n)
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name n8n.ai-ops.jaor13.app;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — n8n (with WebSocket support)
# ─────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name n8n.ai-ops.jaor13.app;

    ssl_certificate     /etc/letsencrypt/live/n8n.ai-ops.jaor13.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.ai-ops.jaor13.app/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://n8n:5678;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (n8n editor uses WS)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Prevent timeouts on long-lived WebSocket connections
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        proxy_connect_timeout 60s;

        # Disable buffering for real-time events
        proxy_buffering off;
        proxy_cache off;

        # Chunked transfer encoding support
        chunked_transfer_encoding on;
    }
}
